name: Continuous Integration
on: [push]
jobs:
  check_lock_file:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: uv lock --locked
  check_linting:
    runs-on: ubuntu-latest
    needs: [check_lock_file]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: uvx ruff check .
  check_formatting:
    runs-on: ubuntu-latest
    needs: [check_lock_file]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: uvx ruff format --check .
  check_type_consistency:
    runs-on: ubuntu-latest
    needs: [check_lock_file]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: uv run pyright .
  testing:
    runs-on: ubuntu-latest
    needs: [check_lock_file]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: uv run pytest -v --durations=0 --cov --cov-report=markdown:COVERAGE.md